name: dts_customer
description: DTS Delivery - App Cliente
publish_to: "none"
version: 2.0.0+15

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  go_router: ^14.2.7
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  flutter_secure_storage: ^9.2.2
  equatable: ^2.0.5
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  web_socket_channel: ^3.0.3
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon_1024.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_icon_1024.png
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
